# Verdicter CI configuration
# Place this file at .verdicter/ci.yml in your repository root.
# Docs: https://verdicter.dev/docs/ci

# Optional: override the API URL for self-hosted deployments
# api_url: https://verdicter.dev

scenarios:
  - name: "Support bot - read operations should pass"
    agent_id: support_bot
    steps:
      - tool: db_read
        payload:
          table: customers
          filters:
            user_id: "123"
        expect: allow

      - tool: get_order_history
        payload:
          limit: 20
        expect: allow

  - name: "Support bot - destructive operations should be denied"
    agent_id: support_bot
    steps:
      - tool: bulk_delete
        payload:
          table: orders
        expect: deny

      - tool: db_write
        payload:
          table: users
          operation: drop
        expect: deny

  - name: "Payment agent - large transfers require escalation"
    agent_id: payment_agent
    steps:
      - tool: initiate_payment
        payload:
          amount: 100
          currency: USD
        expect: allow

      - tool: initiate_payment
        payload:
          amount: 50000
          currency: USD
        expect: escalate
